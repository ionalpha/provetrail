name: Release npm package

# Publishes clients/npm to npm with build provenance (a signed attestation linking
# the published tarball to this repository, commit, and workflow run). Manual
# trigger only: bump the version in clients/npm/package.json, then run this.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-npm
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    defaults:
      run:
        working-directory: clients/npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm test
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
